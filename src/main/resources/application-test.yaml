spring:
  datasource:
    # 메모리 모드 (애플리케이션 종료 시 데이터 삭제)
    url: jdbc:h2:mem:testdb
    # 파일 모드 (데이터 유지하고 싶을 때, 경로 수정 필요)
    # url: jdbc:h2:file:~/testdb 
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true      # 웹 브라우저에서 DB 확인 가능 (localhost:8080/h2-console)
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update   # 엔티티 변경 시 테이블 자동 업데이트
    show-sql: true       # 실행되는 SQL 로그 출력
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect